namespace:
  create: true
  name: database

replicaCount: 1

auth:
  rootPassword: rootpass123
  database: appdb
  username: appuser
  password: apppass123

storage:
  existingClaim: mysql-pvc
  className: manual
  size: 3Gi
  accessMode: ReadWriteOnce
  persistentVolume:
    enabled: true
    name: mysql-pv
    hostPath: /data/mysql
    reclaimPolicy: Retain
  persistentVolumeClaim:
    enabled: true
    name: mysql-pvc
