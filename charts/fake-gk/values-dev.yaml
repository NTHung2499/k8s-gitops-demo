namespace:
  create: true
  name: fake-gk
replicaCount: 2
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
image:
  repository: ghcr.io/nthung2499/fake-gk
  tag: 2026.06.14.0143
  pullPolicy: Always
service:
  type: ClusterIP
  port: 3000
ingress:
  enabled: true
  className: traefik
  host: ""
  path: /
  pathType: Prefix
env:
  PORT: "3000"
  MYSQL_HOST: mysql.database.svc.cluster.local
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: appdb
  MYSQL_USER: appuser
  MYSQL_CONNECTION_LIMIT: "10"
  OPENAI_MODEL: gpt-5.4-mini
  CHAT_CONTEXT_MESSAGES: "30"
  OPENAI_REQUEST_TIMEOUT_SECONDS: "60"
secret:
  MYSQL_PASSWORD: apppass123
  APP_SECRET: dev-only-fakegk-secret-change-me
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
