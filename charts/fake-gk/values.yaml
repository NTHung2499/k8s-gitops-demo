namespace:
  create: true
  name: fake-gk

replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

image:
  repository: ghcr.io/nthung2499/fake-gk
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: traefik
  host: ""
  path: /
  pathType: Prefix

env:
  PORT: "3000"
  MYSQL_HOST: mysql.database.svc.cluster.local
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: appdb
  MYSQL_USER: appuser
  MYSQL_CONNECTION_LIMIT: "10"
  OPENAI_MODEL: gpt-5.4-mini
  CHAT_CONTEXT_MESSAGES: "30"
  OPENAI_REQUEST_TIMEOUT_SECONDS: "60"

secret:
  MYSQL_PASSWORD: apppass123
  APP_SECRET: dev-only-fakegk-secret-change-me

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 3
  readiness:
    path: /readyz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
