apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-helm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NTHung2499/k8s-gitops-demo.git
    targetRevision: main
    path: charts/nginx-demo
    helm:
      releaseName: nginx-helm
      values: |
        namespace:
          create: true
          name: demo-helm
        replicaCount: 1
        ingress:
          enabled: true
          className: traefik
          host: ""
          path: /
          pathType: Prefix
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-helm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true